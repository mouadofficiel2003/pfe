spring.application.name=convocation-service
server.port=8086

# Base dédiée au microservice convocation (historique des envois de convocations).
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/data_convocations}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway : migrations SQL sous src/main/resources/db/migration (ex. V1__init_convocation.sql).
spring.flyway.locations=classpath:db/migration

# Même secret que auth-service (HS256) — en production : variable d'environnement.
auth.jwt.secret=${JWT_SECRET:pfe-dev-jwt-secret-key-change-me-min-32b!!}

# Services lus pour assembler les convocations (JWT du gestionnaire relayé tel quel).
candidat.service.base-url=http://localhost:8082
concours.service.base-url=http://localhost:8083
lieux.service.base-url=http://localhost:8084

# Envoi des convocations par e-mail via SMTP Gmail.
# En production, définir MAIL_USERNAME (adresse Gmail) et MAIL_PASSWORD (mot de passe
# d'application Gmail à 16 caractères, PAS le mot de passe du compte). Sans ces variables,
# l'endpoint d'envoi renvoie 503 (service mail non configuré).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Adresse expéditrice affichée (par défaut, l'adresse d'authentification Gmail).
convocation.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}
# Fuseau horaire utilisé pour formater la date/heure de l'examen sur la convocation.
convocation.zone=${CONVOCATION_ZONE:Africa/Casablanca}
