spring.application.name=concours-service
server.port=8083

spring.datasource.url=jdbc:postgresql://localhost:5432/data_concours
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.locations=classpath:db/migration

# Même secret que auth-service (HS256).
auth.jwt.secret=pfe-dev-jwt-secret-key-change-me-min-32b!!

# URL de lieux-service pour valider les centreId (GET /api/centres/{id}).
lieux.service.base-url=http://localhost:8084
