spring.application.name=candidat-service
server.port=8082

# Base dédiée au microservice candidats (auth / utilisateurs reste sur PFE_Data).
spring.datasource.url=jdbc:postgresql://localhost:5432/data_candidats
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway : migrations SQL sous src/main/resources/db/migration (ex. V1__init_candidat.sql).
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# Même secret que auth-service (HS256) — en production : variable d'environnement.
auth.jwt.secret=pfe-dev-jwt-secret-key-change-me-min-32b!!

# Validation croisée à la mise à jour candidat (JWT relayé depuis le client).
concours.service.base-url=http://localhost:8083
lieux.service.base-url=http://localhost:8084
