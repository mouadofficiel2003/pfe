spring.application.name=repartition-service
server.port=8085

# Base dédiée au microservice répartition (historique des runs + résultats + alertes).
spring.datasource.url=jdbc:postgresql://localhost:5432/data_repartition
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# Flyway : migrations SQL sous src/main/resources/db/migration (ex. V1__init_repartition.sql).
spring.flyway.locations=classpath:db/migration

# Même secret que auth-service (HS256) — en production : variable d'environnement.
auth.jwt.secret=pfe-dev-jwt-secret-key-change-me-min-32b!!

# Services lus/écrits pendant la répartition (JWT du gestionnaire relayé tel quel).
concours.service.base-url=http://localhost:8083
lieux.service.base-url=http://localhost:8084
candidat.service.base-url=http://localhost:8082
